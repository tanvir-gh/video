# Production compose: runs the video-detector container.
# SQLite DB is stored in the work volume. Ollama runs on the host.
#
# Usage:
#   docker compose -f docker-compose.prod.yaml up -d
#   docker compose -f docker-compose.prod.yaml logs -f
#   docker compose -f docker-compose.prod.yaml down

services:
  video:
    image: video-detector:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"  # reach host ollama
    environment:
      APP_OLLAMA_URL: http://host.docker.internal:11434/api/chat
    volumes:
      - ./samples/hls:/app/samples/hls
      - video_work:/app/work
    restart: unless-stopped

volumes:
  video_work:
