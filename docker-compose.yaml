# Runs the video-detector container. SQLite DB is stored in the work
# volume. Ollama runs on the host (reached via host.docker.internal).
#
# Usage:
#   docker compose up -d
#   docker compose logs -f
#   docker compose down

services:
  video:
    image: video-detector:latest
    build:
      context: .
      dockerfile: Dockerfile
    # Host networking: container shares host's network stack so it can
    # reach ollama at 127.0.0.1:11434 regardless of ollama's bind address.
    # App listens on host port 8080 directly (no -p needed).
    network_mode: host
    environment:
      APP_OLLAMA_URL: http://127.0.0.1:11434/api/chat
    volumes:
      - ./samples/hls:/app/samples/hls
      - video_work:/app/work
    restart: unless-stopped

volumes:
  video_work:
