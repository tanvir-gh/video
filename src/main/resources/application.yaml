spring:
  application:
    name: video

logging:
  level:
    com.tanvir.video: DEBUG

app:
  hls-dir: ${user.dir}/samples/hls
  detection:
    window-duration: 30
    confidence-threshold: 0.7
    keyframe-count: 3
    keyframe-width: 1280
    whisper-enabled: false
    whisper-model: base
    whisper-translate: true
    work-dir: ${user.dir}/work
  ollama:
    url: http://localhost:11434/api/chat
    model: qwen3.5:9b
    max-tokens: 500
    temperature: 0.1
