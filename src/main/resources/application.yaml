spring:
  application:
    name: video

logging:
  level:
    com.tanvir.video: DEBUG

app:
  hls-dir: ${user.dir}/samples/hls
  detection:
    audio-threshold-multiplier: 2.0
    confidence-threshold: 0.7
    window-duration: 30
    window-overlap: 15
    whisper-model: base
    work-dir: ${user.dir}/work
  openrouter:
    api-url: http://localhost:11434/api/chat
    model: qwen3.5:4b
    api-key: ""
    enabled: true
