<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HLS Player</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #0a0a0a; height: 100vh; }
        .player-area { background: #000; min-height: 300px; }
        .event-log { height: 180px; overflow-y: auto; font-family: monospace; font-size: 12px; }
        .log-triage { color: #6c757d; }
        .log-candidate { color: #ffc107; }
        .log-classifying { color: #0dcaf0; }
        .log-event { color: #198754; font-weight: bold; }
        .log-error { color: #dc3545; }
        .log-progress { color: #adb5bd; }
        .sidebar { min-width: 260px; max-width: 280px; }
        video { display: none; }
    </style>
</head>
<body class="d-flex flex-column text-light" data-bs-theme="dark">

    <nav class="navbar navbar-dark border-bottom border-secondary px-3">
        <span class="navbar-brand mb-0 h6">HLS Player</span>
        <div class="d-flex gap-2 ms-auto">
            <input type="text" id="stream-url" class="form-control form-control-sm" style="width:320px"
                   placeholder="Stream URL or local path..." />
            <button id="start-btn" class="btn btn-sm btn-outline-success" onclick="startProcessing()">Process</button>
            <button id="stop-btn" class="btn btn-sm btn-outline-danger d-none" onclick="stopProcessing()">Stop</button>
        </div>
    </nav>

    <div class="d-flex flex-grow-1" style="min-height:0">
        <div class="flex-grow-1 d-flex flex-column">
            <div class="player-area flex-grow-1 d-flex align-items-center justify-content-center p-3">
                <span id="placeholder" class="text-secondary">Select a clip to play</span>
                <video id="video" class="w-100 rounded" style="max-height:100%" controls></video>
            </div>
            <div id="quality" class="text-center text-secondary small py-1"></div>
            <div class="event-log border-top border-secondary p-2" id="event-log"></div>
        </div>

        <aside class="sidebar border-start border-secondary d-flex flex-column">
            <div id="detected-events" class="border-bottom border-secondary">
                <h6 class="text-uppercase text-secondary small fw-semibold px-3 pt-3 pb-2 mb-0">Detected Events</h6>
                <ul class="list-unstyled px-2 pb-2 mb-0" id="detected-list"></ul>
            </div>
            <div id="ground-truth-section" class="border-bottom border-secondary" style="display:none">
                <h6 class="text-uppercase text-secondary small fw-semibold px-3 pt-3 pb-2 mb-0">Ground Truth</h6>
                <ul class="list-unstyled px-2 pb-2 mb-0" id="ground-truth-list"></ul>
            </div>
            <h6 class="text-uppercase text-secondary small fw-semibold px-3 pt-3 pb-2 mb-0">Clips</h6>
            <ul class="list-unstyled overflow-auto flex-grow-1 px-2" id="video-list">
                <li th:each="name : ${videos}"
                    th:data-src="'/hls/' + ${name} + '/master.m3u8'"
                    th:text="${name}"
                    class="px-3 py-2 rounded small text-light-emphasis"
                    role="button">video</li>
            </ul>
        </aside>
    </div>

    <script>
        var video = document.getElementById('video');
        var placeholder = document.getElementById('placeholder');
        var hls = null;
        var qualityInterval = null;
        var activeLi = null;
        var eventSource = null;
        var currentSessionId = null;
        var lastSeekWindow = -1;
        var sessionReady = false;

        function playSource(src, li) {
            if (qualityInterval) { clearInterval(qualityInterval); }
            if (hls) { hls.destroy(); }
            if (activeLi) { activeLi.classList.remove('active', 'bg-success-subtle', 'text-success'); }
            activeLi = li;
            if (li) { li.classList.add('active', 'bg-success-subtle', 'text-success'); }

            placeholder.style.display = 'none';
            video.style.display = 'block';

            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(src);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() { video.play(); });
                var qualityDiv = document.getElementById('quality');
                qualityInterval = setInterval(function() {
                    if (hls && hls.currentLevel >= 0 && hls.levels[hls.currentLevel]) {
                        var level = hls.levels[hls.currentLevel];
                        qualityDiv.textContent = level.height + 'p \u00b7 ' + Math.round(level.bitrate / 1000) + ' kbps';
                    }
                }, 500);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = src;
                video.play();
            }
        }

        document.getElementById('video-list').addEventListener('click', function(e) {
            var li = e.target.closest('li');
            if (li && li.dataset.src) {
                playSource(li.dataset.src, li);
                var fsPath = li.dataset.src.replace('/hls/', 'samples/hls/');
                document.getElementById('stream-url').value = fsPath;
                loadGroundTruth(fsPath);
                startProcessing();
            }
        });

        document.getElementById('detected-list').addEventListener('click', function(e) {
            var li = e.target.closest('li');
            if (li && li.dataset.src) { playSource(li.dataset.src, li); }
        });

        // Analyze window when user seeks (drag release) or playback crosses a boundary
        var seeking = false;

        video.addEventListener('seeking', function() { seeking = true; });

        video.addEventListener('seeked', function() {
            seeking = false;
            requestWindowAnalysis();
        });

        video.addEventListener('timeupdate', function() {
            if (seeking) return; // don't fire during drag
            var currentWindow = Math.floor(video.currentTime / 30);
            if (currentWindow !== lastSeekWindow) {
                requestWindowAnalysis();
            }
        });

        function requestWindowAnalysis() {
            if (!currentSessionId || !sessionReady) return;
            var currentWindow = Math.floor(video.currentTime / 30);
            if (currentWindow === lastSeekWindow || currentWindow < 0) return;
            lastSeekWindow = currentWindow;
            fetch('/api/streams/' + currentSessionId + '/seek?time=' + video.currentTime, {method: 'POST'});
        }

        function logEvent(text, cls) {
            var log = document.getElementById('event-log');
            var entry = document.createElement('div');
            entry.className = cls || '';
            entry.textContent = '[' + new Date().toLocaleTimeString() + '] ' + text;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function startProcessing() {
            if (currentSessionId) {
                fetch('/api/streams/' + currentSessionId, {method: 'DELETE'});
                if (eventSource) { eventSource.close(); }
            }
            document.getElementById('event-log').innerHTML = '';
            document.getElementById('detected-list').innerHTML = '';
            lastSeekWindow = -1;
            sessionReady = false;

            var url = document.getElementById('stream-url').value.trim();
            if (!url) return;

            fetch('/api/streams', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url: url})
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                currentSessionId = data.id;
                document.getElementById('start-btn').classList.add('d-none');
                document.getElementById('stop-btn').classList.remove('d-none');
                logEvent('Started processing: ' + url, 'log-progress');

                eventSource = new EventSource('/api/streams/' + data.id + '/events');
                eventSource.onmessage = function(e) { handleStreamEvent(JSON.parse(e.data)); };
                eventSource.onerror = function() { logEvent('Connection lost', 'log-error'); eventSource.close(); };
            });
        }

        function stopProcessing() {
            if (currentSessionId) { fetch('/api/streams/' + currentSessionId, {method: 'DELETE'}); }
            if (eventSource) { eventSource.close(); }
            document.getElementById('start-btn').classList.remove('d-none');
            document.getElementById('stop-btn').classList.add('d-none');
            logEvent('Stopped', 'log-progress');
        }

        function handleStreamEvent(msg) {
            switch (msg.type) {
                case 'triage':
                    var tr = msg.timeRange ? ' [' + msg.timeRange + ']' : '';
                    logEvent(tr + ' ' + (msg.candidate ? 'CANDIDATE - ' : 'skip - ') + msg.reason,
                             msg.candidate ? 'log-candidate' : 'log-triage');
                    break;
                case 'classifying':
                    var cr = msg.timeRange ? ' [' + msg.timeRange + ']' : '';
                    logEvent(cr + ' analyzing...', 'log-classifying'); break;
                case 'suppressed':
                    logEvent('Window ' + msg.window + ': suppressed ' + msg.event + ' (' + msg.reason + ')', 'log-triage'); break;
                case 'event':
                    logEvent('DETECTED: ' + msg.event + ' (confidence: ' + msg.confidence.toFixed(2) + ')', 'log-event');
                    addDetectedEvent(msg); break;
                case 'low_confidence':
                    logEvent('Possible ' + msg.event + ' (conf: ' + msg.confidence.toFixed(2) + ')', 'log-triage'); break;
                case 'ready':
                    sessionReady = true;
                    logEvent('Ready: ' + msg.windows + ' windows (' + msg.windowDuration + 's each). Seek or play to analyze.', 'log-progress');
                    // Trigger analysis of current playback position
                    if (video.currentTime > 0) {
                        lastSeekWindow = -1; // force re-seek
                    }
                    break;
                case 'progress':
                    logEvent(msg.message, 'log-progress'); break;
                case 'error':
                    logEvent('ERROR: ' + msg.message, 'log-error'); break;
                case 'done':
                    logEvent('Done: ' + msg.events + ' events, ' + msg.windows + ' windows, ' + msg.candidates + ' candidates', 'log-progress');
                    stopProcessing(); break;
            }
        }

        function addDetectedEvent(msg) {
            var list = document.getElementById('detected-list');
            var li = document.createElement('li');
            li.className = 'px-3 py-2 rounded small';
            li.setAttribute('role', 'button');
            var badgeColor = {goal:'success', penalty:'warning', red_card:'danger', red:'danger',
                              yellow_card:'warning', yellow:'warning', save:'info', shot:'info'}[
                              msg.event.replace(' ', '_').replace('/', '_')] || 'secondary';
            var timeStr = Math.floor(msg.timestamp / 60) + ':' + ('0' + Math.floor(msg.timestamp % 60)).slice(-2);
            li.innerHTML = '<span class="badge bg-' + badgeColor + ' me-1">' + msg.event + '</span>' + timeStr;
            if (msg.description) {
                li.innerHTML += '<div class="text-secondary mt-1" style="font-size:11px">' +
                    msg.description.substring(0, 60) + '</div>';
            }
            li.dataset.src = '/hls/' + currentSessionId + '/' + msg.clip + '/master.m3u8';
            list.appendChild(li);
        }

        function loadGroundTruth(clipPath) {
            var gtList = document.getElementById('ground-truth-list');
            var gtSection = document.getElementById('ground-truth-section');
            gtList.innerHTML = '';
            gtSection.style.display = 'none';

            fetch('/api/streams/ground-truth?clip=' + encodeURIComponent(clipPath))
            .then(function(r) { return r.json(); })
            .then(function(events) {
                if (!events.length) return;
                gtSection.style.display = '';
                events.forEach(function(ev) {
                    var li = document.createElement('li');
                    li.className = 'px-3 py-1 small text-secondary';
                    var sec = ev.offset_sec;
                    var timeStr = Math.floor(sec / 60) + ':' + ('0' + Math.floor(sec % 60)).slice(-2);
                    var badgeColor = {Goal:'success', Penalty:'warning', 'Red card':'danger',
                                      'Yellow card':'warning', 'Shots on target':'info'}[ev.type] || 'secondary';
                    li.innerHTML = '<span class="badge bg-' + badgeColor + ' bg-opacity-50 me-1">' +
                        ev.type + '</span>' + timeStr + ' <span class="text-secondary-emphasis">(' + ev.team + ')</span>';
                    gtList.appendChild(li);
                });
            });
        }
    </script>
</body>
</html>
